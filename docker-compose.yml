# STRATT — Docker Compose
# Lancement complet : docker compose up --build
# Développement local (infra only) : docker compose up postgres redis minio meilisearch

services:
  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: stratt_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stratt_dev}
      POSTGRES_USER: ${POSTGRES_USER:-stratt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stratt_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stratt} -d ${POSTGRES_DB:-stratt_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: stratt_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── MinIO (stockage S3-compatible) ──────────────────────
  minio:
    image: minio/minio:latest
    container_name: stratt_minio
    restart: unless-stopped
    expose:
      - "9000"
      - "9001"
    networks:
      - default
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.stratt-minio.rule=Host(`minio.stratt.fr`)"
      - "traefik.http.routers.stratt-minio.entrypoints=https"
      - "traefik.http.routers.stratt-minio.tls=true"
      - "traefik.http.routers.stratt-minio.tls.certresolver=letsencrypt"
      - "traefik.http.services.stratt-minio.loadbalancer.server.port=9000"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-stratt_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-stratt_minio_secret}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Meilisearch ─────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: stratt_meilisearch
    restart: unless-stopped
    expose:
      - "7700"
    networks:
      - default
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.stratt-meilisearch.rule=Host(`search.stratt.fr`)"
      - "traefik.http.routers.stratt-meilisearch.entrypoints=https"
      - "traefik.http.routers.stratt-meilisearch.tls=true"
      - "traefik.http.routers.stratt-meilisearch.tls.certresolver=letsencrypt"
      - "traefik.http.services.stratt-meilisearch.loadbalancer.server.port=7700"
    environment:
      MEILI_ENV: ${APP_ENV:-development}
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:-stratt_meili_dev_key}
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── API Go/Gin + GORM ─────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: ../infra/docker/Dockerfile.backend
    container_name: stratt_api
    restart: unless-stopped
    expose:
      - "8080"
    networks:
      - default
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.stratt-api.rule=Host(`api.stratt.fr`)"
      - "traefik.http.routers.stratt-api.entrypoints=https"
      - "traefik.http.routers.stratt-api.tls=true"
      - "traefik.http.routers.stratt-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.stratt-api.loadbalancer.server.port=8080"
    environment:
      PORT: 8080
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-stratt}:${POSTGRES_PASSWORD:-stratt_dev_password}@postgres:5432/${POSTGRES_DB:-stratt_dev}?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production_min_32_chars}
      JWT_ACCESS_EXP_MINUTES: ${JWT_ACCESS_EXP_MINUTES:-15}
      JWT_REFRESH_EXP_DAYS: ${JWT_REFRESH_EXP_DAYS:-30}
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY:-stratt_meili_dev_key}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-stratt_minio}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-stratt_minio_secret}
      S3_BUCKET: ${S3_BUCKET:-stratt}
      FRONTEND_URL: ${FRONTEND_URL:-https://app.stratt.fr}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Frontend Next.js ────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../infra/docker/Dockerfile.frontend
    container_name: stratt_frontend
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - default
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.stratt-frontend.rule=Host(`app.stratt.fr`)"
      - "traefik.http.routers.stratt-frontend.entrypoints=https"
      - "traefik.http.routers.stratt-frontend.tls=true"
      - "traefik.http.routers.stratt-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.stratt-frontend.loadbalancer.server.port=3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.stratt.fr}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://app.stratt.fr}
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
  meilisearch_data:

networks:
  coolify:
    external: true
