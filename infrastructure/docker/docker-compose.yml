version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: axiora_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: axiora_dev
      POSTGRES_USER: axiora
      POSTGRES_PASSWORD: axiora_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axiora -d axiora_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: axiora_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── MinIO (S3-compatible storage) ───────────────────────
  minio:
    image: minio/minio:latest
    container_name: axiora_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: axiora_minio
      MINIO_ROOT_PASSWORD: axiora_minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── API Go ──────────────────────────────────────────────
  api:
    build:
      context: ../../apps/api
      dockerfile: ../../infrastructure/docker/Dockerfile.api
    container_name: axiora_api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://axiora:axiora_dev_password@postgres:5432/axiora_dev
      - REDIS_URL=redis://redis:6379
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=axiora_minio
      - S3_SECRET_KEY=axiora_minio_secret
      - S3_BUCKET=axiora-exports
      - JWT_SECRET=${JWT_SECRET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - STACK_AUTH_SECRET_KEY=${STACK_AUTH_SECRET_KEY}
      - APP_ENV=development
      - PORT=8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../apps/api:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Worker async (Asynq) ─────────────────────────────────
  worker:
    build:
      context: ../../apps/api
      dockerfile: ../../infrastructure/docker/Dockerfile.worker
    container_name: axiora_worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://axiora:axiora_dev_password@postgres:5432/axiora_dev
      - REDIS_URL=redis://redis:6379
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=axiora_minio
      - S3_SECRET_KEY=axiora_minio_secret
      - S3_BUCKET=axiora-exports
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - APP_ENV=development
    depends_on:
      - api
      - redis
      - postgres

  # ── Frontend Next.js ────────────────────────────────────
  web:
    build:
      context: ../../apps/web
      dockerfile: ../../infrastructure/docker/Dockerfile.web
    container_name: axiora_web
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - STACK_AUTH_PUBLISHABLE_KEY=${STACK_AUTH_PUBLISHABLE_KEY}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  minio_data:
