name: CI — Test & Lint

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint & Type Check Frontend ─────────────────────────
  lint-frontend:
    name: Lint (TypeScript + ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: TypeScript check
        run: pnpm tsc --noEmit

      - name: Prettier check
        run: pnpm prettier --check .

  # ── Tests Frontend ─────────────────────────────────────
  test-frontend:
    name: Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm test --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── Lint & Tests Backend Go ────────────────────────────
  test-backend:
    name: Tests (Go)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: axiora_test
          POSTGRES_USER: axiora
          POSTGRES_PASSWORD: axiora_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.57.0

      - name: Lint Go
        working-directory: apps/api
        run: golangci-lint run ./...

      - name: Run migrations
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://axiora:axiora_test_password@localhost:5432/axiora_test
        run: go run ./cmd/migrate up

      - name: Run tests
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://axiora:axiora_test_password@localhost:5432/axiora_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key
          APP_ENV: test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Check coverage
        working-directory: apps/api
        run: go tool cover -func coverage.out | grep total | awk '{print $3}' | sed 's/%//' | awk '{if ($1 < 80) exit 1}'

  # ── Build Docker (dry-run) ─────────────────────────────
  build-docker:
    name: Docker Build (dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: apps/api
          file: infrastructure/docker/Dockerfile.api
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web image
        uses: docker/build-push-action@v5
        with:
          context: apps/web
          file: infrastructure/docker/Dockerfile.web
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
