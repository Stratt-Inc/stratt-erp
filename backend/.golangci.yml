run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable-all: false
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - gofmt
    - goimports

linters-settings:
  goimports:
    local-prefixes: github.com/axiora/backend

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
  max-issues-per-linter: 50
  max-same-issues: 10
