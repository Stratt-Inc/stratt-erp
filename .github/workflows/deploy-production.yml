name: Deploy — Production

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ghcr.io/makcimerrr/axiora/frontend
  BACKEND_IMAGE: ghcr.io/makcimerrr/axiora/backend

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Check Fly.io configuration
        id: check
        run: |
          if [ -z "${{ secrets.FLY_API_TOKEN_PRODUCTION }}" ]; then
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "::warning::FLY_API_TOKEN_PRODUCTION is not set — skipping Fly.io deployment"
          else
            echo "ready=true" >> $GITHUB_OUTPUT
          fi

      - uses: superfly/flyctl-actions/setup-flyctl@master
        if: steps.check.outputs.ready == 'true'

      - uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build & push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: infra/docker/Dockerfile.frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.version.outputs.VERSION }}
            ${{ env.FRONTEND_IMAGE }}:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Build & push backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: infra/docker/Dockerfile.backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.version.outputs.VERSION }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Deploy backend to Fly.io
        if: steps.check.outputs.ready == 'true'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PRODUCTION }}
        run: flyctl deploy --config infra/fly/fly.backend.production.toml --image ${{ env.BACKEND_IMAGE }}:${{ steps.version.outputs.VERSION }}

      - name: Deploy frontend to Fly.io
        if: steps.check.outputs.ready == 'true'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PRODUCTION }}
        run: flyctl deploy --config infra/fly/fly.frontend.production.toml --image ${{ env.FRONTEND_IMAGE }}:${{ steps.version.outputs.VERSION }}

      - name: Smoke test
        if: steps.check.outputs.ready == 'true'
        run: |
          sleep 10
          curl -f ${{ vars.PRODUCTION_URL }}/health || exit 1

      - name: Deployment summary
        if: steps.check.outputs.ready == 'false'
        run: |
          echo "## ⚠️ Partial deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Docker images pushed to GHCR ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Fly.io deployment skipped — \`FLY_API_TOKEN_PRODUCTION\` not configured." >> $GITHUB_STEP_SUMMARY
          echo "Set it in **Settings → Environments → production → Secrets**." >> $GITHUB_STEP_SUMMARY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}
