name: Deploy — Production

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build & push frontend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/Dockerfile.frontend
          push: true
          tags: |
            ghcr.io/makcimerrr/strat-gie-achats-publics/frontend:${{ steps.version.outputs.VERSION }}
            ghcr.io/makcimerrr/strat-gie-achats-publics/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/Dockerfile.backend
          push: true
          tags: |
            ghcr.io/makcimerrr/strat-gie-achats-publics/backend:${{ steps.version.outputs.VERSION }}
            ghcr.io/makcimerrr/strat-gie-achats-publics/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy backend to Fly.io (production)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PRODUCTION }}
        run: flyctl deploy --config infra/fly/fly.backend.production.toml --image ghcr.io/makcimerrr/strat-gie-achats-publics/backend:${{ steps.version.outputs.VERSION }}

      - name: Deploy frontend to Fly.io (production)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PRODUCTION }}
        run: flyctl deploy --config infra/fly/fly.frontend.production.toml --image ghcr.io/makcimerrr/strat-gie-achats-publics/frontend:${{ steps.version.outputs.VERSION }}

      - name: Smoke test
        run: |
          sleep 10
          curl -f ${{ secrets.PRODUCTION_URL }}/health || exit 1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}
