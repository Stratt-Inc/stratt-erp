name: Deploy — Staging

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  FRONTEND_IMAGE: ghcr.io/makcimerrr/axiora/frontend
  BACKEND_IMAGE: ghcr.io/makcimerrr/axiora/backend

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Check Fly.io configuration
        id: check
        run: |
          if [ -z "${{ secrets.FLY_API_TOKEN_STAGING }}" ]; then
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "::warning::FLY_API_TOKEN_STAGING is not set — skipping Fly.io deployment"
          else
            echo "ready=true" >> $GITHUB_OUTPUT
          fi

      - uses: superfly/flyctl-actions/setup-flyctl@master
        if: steps.check.outputs.ready == 'true'

      - uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: infra/docker/Dockerfile.frontend
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:staging-${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL_STAGING }}
          cache-from: type=gha,scope=frontend-staging
          cache-to: type=gha,scope=frontend-staging,mode=max

      - name: Build & push backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: infra/docker/Dockerfile.backend
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:staging-${{ github.sha }}
          cache-from: type=gha,scope=backend-staging
          cache-to: type=gha,scope=backend-staging,mode=max

      - name: Deploy backend to Fly.io (staging)
        if: steps.check.outputs.ready == 'true'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_STAGING }}
        run: flyctl deploy --config infra/fly/fly.backend.staging.toml --image ${{ env.BACKEND_IMAGE }}:staging-${{ github.sha }}

      - name: Deploy frontend to Fly.io (staging)
        if: steps.check.outputs.ready == 'true'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_STAGING }}
        run: flyctl deploy --config infra/fly/fly.frontend.staging.toml --image ${{ env.FRONTEND_IMAGE }}:staging-${{ github.sha }}

      - name: Smoke test
        if: steps.check.outputs.ready == 'true'
        run: curl -f ${{ vars.STAGING_URL }}/health || exit 1
