name: Deploy — Staging

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.frontend
          push: true
          tags: ghcr.io/makcimerrr/strat-gie-achats-publics/frontend:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.backend
          push: true
          tags: ghcr.io/makcimerrr/strat-gie-achats-publics/backend:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy backend to Fly.io (staging)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_STAGING }}
        run: flyctl deploy --config infra/fly/fly.backend.staging.toml --image ghcr.io/makcimerrr/strat-gie-achats-publics/backend:staging-${{ github.sha }}

      - name: Deploy frontend to Fly.io (staging)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_STAGING }}
        run: flyctl deploy --config infra/fly/fly.frontend.staging.toml --image ghcr.io/makcimerrr/strat-gie-achats-publics/frontend:staging-${{ github.sha }}

      - name: Run smoke tests
        run: curl -f ${{ secrets.STAGING_URL }}/health || exit 1
