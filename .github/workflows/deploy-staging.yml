name: Deploy — Staging

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  FRONTEND_IMAGE: ghcr.io/stratt-inc/stratt-erp/frontend
  BACKEND_IMAGE: ghcr.io/stratt-inc/stratt-erp/backend

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: infra/docker/Dockerfile.frontend
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:staging-${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL_STAGING }}
          cache-from: type=gha,scope=frontend-staging
          cache-to: type=gha,scope=frontend-staging,mode=max

      - name: Build & push backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: infra/docker/Dockerfile.backend
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:staging-${{ github.sha }}
          cache-from: type=gha,scope=backend-staging
          cache-to: type=gha,scope=backend-staging,mode=max

      - name: Trigger Coolify Deploy — Staging
        run: |
          curl -fsSL -X POST "${{ secrets.COOLIFY_WEBHOOK_URL_STAGING }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json"
