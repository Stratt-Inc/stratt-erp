name: Project — Status Automation

# ─── IDs (Stratt-Inc — Development Board) ─────────────────────────────────
# Project  : PVT_kwDOD_9y2M4BR0do
# Field    : PVTSSF_lADOD_9y2M4BR0dozg_iMbs
# Options  :
#   Backlog                02bfc027
#   Todo                   abb27ecf
#   Veille Concurrentielle 4098b9a7
#   In Progress            166653a6
#   In Review              459d3b0d
#   Testing                fe3f5b2a
#   Blocked                af10d74d
#   Done                   d3187c45
#   Shipped                b8e9910f

on:
  issues:
    types: [opened, labeled, unlabeled, closed, reopened, assigned]
  pull_request:
    types: [opened, ready_for_review, review_requested, closed]
  check_suite:
    types: [completed]
  push:
    branches: [staging, main]
    tags:
      - "v*.*.*"

permissions:
  issues: write
  pull-requests: read

env:
  PROJECT_ID: PVT_kwDOD_9y2M4BR0do
  FIELD_ID: PVTSSF_lADOD_9y2M4BR0dozg_iMbs
  OPT_BACKLOG: "02bfc027"
  OPT_TODO: "abb27ecf"
  OPT_IN_PROGRESS: "166653a6"
  OPT_IN_REVIEW: "459d3b0d"
  OPT_TESTING: "fe3f5b2a"
  OPT_BLOCKED: "af10d74d"
  OPT_DONE: "d3187c45"
  OPT_SHIPPED: "b8e9910f"

jobs:

  # ── Issue ouverte → 📋 Backlog ─────────────────────────────────────────────
  issue-opened:
    name: Issue opened → Backlog
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'opened'
    steps:
      - uses: actions/add-to-project@v1.0.2
        id: add
        with:
          project-url: https://github.com/orgs/Stratt-Inc/projects/1
          github-token: ${{ secrets.PROJECT_TOKEN }}
      - name: Set Status → Backlog
        if: steps.add.outputs.itemId != ''
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ITEM_ID: ${{ steps.add.outputs.itemId }}
        run: |
          gh api graphql -f query='mutation {
            updateProjectV2ItemFieldValue(input: {
              projectId: "'"$PROJECT_ID"'" itemId: "'"$ITEM_ID"'"
              fieldId: "'"$FIELD_ID"'"
              value: { singleSelectOptionId: "'"$OPT_BACKLOG"'" }
            }) { projectV2Item { id } }
          }'

  # ── Label "blocked" ajouté → 🚫 Blocked ───────────────────────────────────
  issue-blocked:
    name: Issue labeled blocked → Blocked
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'blocked'
    steps:
      - name: Set Status → Blocked
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ISSUE_NODE_ID: ${{ github.event.issue.node_id }}
        run: |
          ITEM_ID=$(gh api graphql -f query='query { node(id: "'"$ISSUE_NODE_ID"'") {
            ... on Issue { projectItems(first:5) { nodes { id project { id } } } }
          }}' --jq '.data.node.projectItems.nodes[] | select(.project.id == "'"$PROJECT_ID"'") | .id')
          [ -z "$ITEM_ID" ] && exit 0
          gh api graphql -f query='mutation {
            updateProjectV2ItemFieldValue(input: {
              projectId: "'"$PROJECT_ID"'" itemId: "'"$ITEM_ID"'"
              fieldId: "'"$FIELD_ID"'"
              value: { singleSelectOptionId: "'"$OPT_BLOCKED"'" }
            }) { projectV2Item { id } }
          }' && echo "✅ Blocked — #${{ github.event.issue.number }}"

  # ── Label "blocked" retiré → ⚡ In Progress (seulement si statut = Blocked) ─
  issue-unblocked:
    name: Issue unlabeled blocked → In Progress
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'unlabeled' && github.event.label.name == 'blocked'
    steps:
      - name: Set Status → In Progress (only if currently Blocked)
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ISSUE_NODE_ID: ${{ github.event.issue.node_id }}
        run: |
          ITEM_ID=$(gh api graphql -f query='query { node(id: "'"$ISSUE_NODE_ID"'") {
            ... on Issue { projectItems(first:5) { nodes { id project { id } } } }
          }}' --jq '.data.node.projectItems.nodes[] | select(.project.id == "'"$PROJECT_ID"'") | .id')
          [ -z "$ITEM_ID" ] && exit 0
          CURRENT=$(gh api graphql -f query='query { node(id: "'"$ITEM_ID"'") {
            ... on ProjectV2Item { fieldValueByName(name:"Status") {
              ... on ProjectV2ItemFieldSingleSelectValue { optionId }
            }}
          }}' --jq '.data.node.fieldValueByName.optionId')
          if [ "$CURRENT" != "$OPT_BLOCKED" ]; then
            echo "Status is not Blocked (current: $CURRENT) — skipping transition"
            exit 0
          fi
          gh api graphql -f query='mutation {
            updateProjectV2ItemFieldValue(input: {
              projectId: "'"$PROJECT_ID"'" itemId: "'"$ITEM_ID"'"
              fieldId: "'"$FIELD_ID"'"
              value: { singleSelectOptionId: "'"$OPT_IN_PROGRESS"'" }
            }) { projectV2Item { id } }
          }' && echo "✅ In Progress (unblocked) — #${{ github.event.issue.number }}"

  # ── Issue fermée → ✅ Done ─────────────────────────────────────────────────
  issue-closed:
    name: Issue closed → Done
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'closed'
    steps:
      - name: Set Status → Done
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ISSUE_NODE_ID: ${{ github.event.issue.node_id }}
        run: |
          ITEM_ID=$(gh api graphql -f query='query { node(id: "'"$ISSUE_NODE_ID"'") {
            ... on Issue { projectItems(first:5) { nodes { id project { id } } } }
          }}' --jq '.data.node.projectItems.nodes[] | select(.project.id == "'"$PROJECT_ID"'") | .id')
          [ -z "$ITEM_ID" ] && exit 0
          gh api graphql -f query='mutation {
            updateProjectV2ItemFieldValue(input: {
              projectId: "'"$PROJECT_ID"'" itemId: "'"$ITEM_ID"'"
              fieldId: "'"$FIELD_ID"'"
              value: { singleSelectOptionId: "'"$OPT_DONE"'" }
            }) { projectV2Item { id } }
          }' && echo "✅ Done — #${{ github.event.issue.number }}"

  # ── Issue assignée → ⚡ In Progress ───────────────────────────────────────
  issue-assigned:
    name: Issue assigned → In Progress
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'assigned'
    steps:
      - name: Set Status → In Progress
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ISSUE_NODE_ID: ${{ github.event.issue.node_id }}
        run: |
          ITEM_ID=$(gh api graphql -f query='query { node(id: "'"$ISSUE_NODE_ID"'") {
            ... on Issue { projectItems(first:5) { nodes { id project { id } } } }
          }}' --jq '.data.node.projectItems.nodes[] | select(.project.id == "'"$PROJECT_ID"'") | .id')
          [ -z "$ITEM_ID" ] && echo "Issue not in project, skipping" && exit 0
          CURRENT=$(gh api graphql -f query='query { node(id: "'"$ITEM_ID"'") {
            ... on ProjectV2Item { fieldValueByName(name:"Status") {
              ... on ProjectV2ItemFieldSingleSelectValue { optionId }
            }}
          }}' --jq '.data.node.fieldValueByName.optionId // empty')
          if [ "$CURRENT" = "$OPT_DONE" ] || [ "$CURRENT" = "$OPT_SHIPPED" ] || [ "$CURRENT" = "$OPT_TESTING" ]; then
            echo "Status is $CURRENT — not overriding to In Progress"
            exit 0
          fi
          gh api graphql -f query='mutation {
            updateProjectV2ItemFieldValue(input: {
              projectId: "'"$PROJECT_ID"'" itemId: "'"$ITEM_ID"'"
              fieldId: "'"$FIELD_ID"'"
              value: { singleSelectOptionId: "'"$OPT_IN_PROGRESS"'" }
            }) { projectV2Item { id } }
          }' && echo "⚡ In Progress — #${{ github.event.issue.number }}"

  # ── Issue réouverte → ⚡ In Progress ──────────────────────────────────────
  issue-reopened:
    name: Issue reopened → In Progress
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'reopened'
    steps:
      - name: Set Status → In Progress
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          ISSUE_NODE_ID: ${{ github.event.issue.node_id }}
        run: |
          ITEM_ID=$(gh api graphql -f query='query { node(id: "'"$ISSUE_NODE_ID"'") {
            ... on Issue { projectItems(first:5) { nodes { id project { id } } } }
          }}' --jq '.data.node.projectItems.nodes[] | select(.project.id == "'"$PROJECT_ID"'") | .id')
          [ -z "$ITEM_ID" ] && exit 0
          gh api graphql -f query='mutation {
            updateProjectV2ItemFieldValue(input: {
              projectId: "'"$PROJECT_ID"'" itemId: "'"$ITEM_ID"'"
              fieldId: "'"$FIELD_ID"'"
              value: { singleSelectOptionId: "'"$OPT_IN_PROGRESS"'" }
            }) { projectV2Item { id } }
          }' && echo "↩️  In Progress — #${{ github.event.issue.number }}"

  # ── PR draft ouverte → ⚡ In Progress ─────────────────────────────────────
  pr-draft:
    name: PR draft → In Progress
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'opened' && github.event.pull_request.draft == true
    steps:
      - name: Set linked issues → In Progress
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          PR_NODE_ID: ${{ github.event.pull_request.node_id }}
        run: |
          ISSUES=$(gh api graphql -f query='query { node(id: "'"$PR_NODE_ID"'") {
            ... on PullRequest { closingIssuesReferences(first:10) { nodes { id } } }
          }}' --jq '.data.node.closingIssuesReferences.nodes[].id')
          for ISSUE_NODE_ID in $ISSUES; do
            ITEM_ID=$(gh api graphql -f query='query { node(id: "'"$ISSUE_NODE_ID"'") {
              ... on Issue { projectItems(first:5) { nodes { id project { id } } } }
            }}' --jq '.data.node.projectItems.nodes[] | select(.project.id == "'"$PROJECT_ID"'") | .id')
            [ -z "$ITEM_ID" ] && continue
            gh api graphql -f query='mutation {
              updateProjectV2ItemFieldValue(input: {
                projectId: "'"$PROJECT_ID"'" itemId: "'"$ITEM_ID"'"
                fieldId: "'"$FIELD_ID"'"
                value: { singleSelectOptionId: "'"$OPT_IN_PROGRESS"'" }
              }) { projectV2Item { id } }
            }' > /dev/null && echo "✅ In Progress — $ISSUE_NODE_ID"
          done

  # ── PR prête / review demandée → 👀 In Review ─────────────────────────────
  pr-in-review:
    name: PR ready → In Review
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      (github.event.action == 'ready_for_review' ||
       github.event.action == 'review_requested' ||
       (github.event.action == 'opened' && github.event.pull_request.draft == false))
    steps:
      - name: Set linked issues → In Review
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          PR_NODE_ID: ${{ github.event.pull_request.node_id }}
        run: |
          ISSUES=$(gh api graphql -f query='query { node(id: "'"$PR_NODE_ID"'") {
            ... on PullRequest { closingIssuesReferences(first:10) { nodes { id } } }
          }}' --jq '.data.node.closingIssuesReferences.nodes[].id')
          for ISSUE_NODE_ID in $ISSUES; do
            ITEM_ID=$(gh api graphql -f query='query { node(id: "'"$ISSUE_NODE_ID"'") {
              ... on Issue { projectItems(first:5) { nodes { id project { id } } } }
            }}' --jq '.data.node.projectItems.nodes[] | select(.project.id == "'"$PROJECT_ID"'") | .id')
            [ -z "$ITEM_ID" ] && continue
            gh api graphql -f query='mutation {
              updateProjectV2ItemFieldValue(input: {
                projectId: "'"$PROJECT_ID"'" itemId: "'"$ITEM_ID"'"
                fieldId: "'"$FIELD_ID"'"
                value: { singleSelectOptionId: "'"$OPT_IN_REVIEW"'" }
              }) { projectV2Item { id } }
            }' > /dev/null && echo "✅ In Review — $ISSUE_NODE_ID"
          done

  # ── CI échoue → 🚫 ajouter label "blocked" sur issues liées ──────────────
  ci-failed:
    name: CI failed → add blocked label
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'check_suite' &&
      github.event.check_suite.conclusion == 'failure'
    steps:
      - name: Add blocked label to linked issues
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          PR_NUMBERS=$(echo '${{ toJson(github.event.check_suite.pull_requests) }}' | jq -r '.[].number // empty')
          [ -z "$PR_NUMBERS" ] && echo "No PRs linked, skipping" && exit 0
          for PR_NUMBER in $PR_NUMBERS; do
            PR_NODE_ID=$(gh api /repos/${{ github.repository }}/pulls/$PR_NUMBER --jq '.node_id')
            ISSUES=$(gh api graphql -f query='query { node(id: "'"$PR_NODE_ID"'") {
              ... on PullRequest { closingIssuesReferences(first:10) { nodes { number } } }
            }}' --jq '.data.node.closingIssuesReferences.nodes[].number')
            for ISSUE_NUMBER in $ISSUES; do
              gh issue edit "$ISSUE_NUMBER" --add-label "blocked" --repo "${{ github.repository }}" \
                && echo "🚫 blocked → #$ISSUE_NUMBER"
            done
          done

  # ── CI réussit → ✅ retirer label "blocked" sur issues liées ──────────────
  ci-passed:
    name: CI passed → remove blocked label
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'check_suite' &&
      github.event.check_suite.conclusion == 'success'
    steps:
      - name: Remove blocked label from linked issues
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          PR_NUMBERS=$(echo '${{ toJson(github.event.check_suite.pull_requests) }}' | jq -r '.[].number // empty')
          [ -z "$PR_NUMBERS" ] && echo "No PRs linked, skipping" && exit 0
          for PR_NUMBER in $PR_NUMBERS; do
            PR_NODE_ID=$(gh api /repos/${{ github.repository }}/pulls/$PR_NUMBER --jq '.node_id')
            ISSUES=$(gh api graphql -f query='query { node(id: "'"$PR_NODE_ID"'") {
              ... on PullRequest { closingIssuesReferences(first:10) { nodes { number } } }
            }}' --jq '.data.node.closingIssuesReferences.nodes[].number')
            for ISSUE_NUMBER in $ISSUES; do
              gh issue edit "$ISSUE_NUMBER" --remove-label "blocked" --repo "${{ github.repository }}" 2>/dev/null \
                && echo "✅ unblocked → #$ISSUE_NUMBER" || true
            done
          done

  # ── PR mergée sur develop → ✅ Done ───────────────────────────────────────
  pr-merged:
    name: PR merged on develop → Done
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'develop'
    steps:
      - name: Set linked issues → Done
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          PR_NODE_ID: ${{ github.event.pull_request.node_id }}
        run: |
          ISSUES=$(gh api graphql -f query='query { node(id: "'"$PR_NODE_ID"'") {
            ... on PullRequest { closingIssuesReferences(first:10) { nodes { id } } }
          }}' --jq '.data.node.closingIssuesReferences.nodes[].id')
          for ISSUE_NODE_ID in $ISSUES; do
            ITEM_ID=$(gh api graphql -f query='query { node(id: "'"$ISSUE_NODE_ID"'") {
              ... on Issue { projectItems(first:5) { nodes { id project { id } } } }
            }}' --jq '.data.node.projectItems.nodes[] | select(.project.id == "'"$PROJECT_ID"'") | .id')
            [ -z "$ITEM_ID" ] && continue
            gh api graphql -f query='mutation {
              updateProjectV2ItemFieldValue(input: {
                projectId: "'"$PROJECT_ID"'" itemId: "'"$ITEM_ID"'"
                fieldId: "'"$FIELD_ID"'"
                value: { singleSelectOptionId: "'"$OPT_DONE"'" }
              }) { projectV2Item { id } }
            }' > /dev/null && echo "✅ Done — $ISSUE_NODE_ID"
          done

  # ── PR fermée sans merge → ⚡ In Progress ─────────────────────────────────
  pr-closed:
    name: PR closed without merge → In Progress
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == false
    steps:
      - name: Set linked issues → In Progress
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          PR_NODE_ID: ${{ github.event.pull_request.node_id }}
        run: |
          ISSUES=$(gh api graphql -f query='query { node(id: "'"$PR_NODE_ID"'") {
            ... on PullRequest { closingIssuesReferences(first:10) { nodes { id } } }
          }}' --jq '.data.node.closingIssuesReferences.nodes[].id')
          for ISSUE_NODE_ID in $ISSUES; do
            ITEM_ID=$(gh api graphql -f query='query { node(id: "'"$ISSUE_NODE_ID"'") {
              ... on Issue { projectItems(first:5) { nodes { id project { id } } } }
            }}' --jq '.data.node.projectItems.nodes[] | select(.project.id == "'"$PROJECT_ID"'") | .id')
            [ -z "$ITEM_ID" ] && continue
            gh api graphql -f query='mutation {
              updateProjectV2ItemFieldValue(input: {
                projectId: "'"$PROJECT_ID"'" itemId: "'"$ITEM_ID"'"
                fieldId: "'"$FIELD_ID"'"
                value: { singleSelectOptionId: "'"$OPT_IN_PROGRESS"'" }
              }) { projectV2Item { id } }
            }' > /dev/null && echo "↩️  In Progress — $ISSUE_NODE_ID"
          done

  # ── Push sur staging → Done → 🧪 Testing ──────────────────────────────────
  staging-deployed:
    name: Push to staging → Done → Testing
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    steps:
      - name: Bulk transition Done → Testing
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          DONE_ITEMS=$(gh api graphql -f query='query {
            node(id: "'"$PROJECT_ID"'") {
              ... on ProjectV2 {
                items(first:100) {
                  nodes {
                    id
                    fieldValueByName(name:"Status") {
                      ... on ProjectV2ItemFieldSingleSelectValue { optionId }
                    }
                  }
                }
              }
            }
          }' --jq '.data.node.items.nodes[] | select(.fieldValueByName.optionId == "'"$OPT_DONE"'") | .id')
          COUNT=0
          for ITEM_ID in $DONE_ITEMS; do
            gh api graphql -f query='mutation {
              updateProjectV2ItemFieldValue(input: {
                projectId: "'"$PROJECT_ID"'" itemId: "'"$ITEM_ID"'"
                fieldId: "'"$FIELD_ID"'"
                value: { singleSelectOptionId: "'"$OPT_TESTING"'" }
              }) { projectV2Item { id } }
            }' > /dev/null
            COUNT=$((COUNT + 1))
          done
          echo "🧪 Testing: $COUNT items (staging ${{ github.sha }})"

  # ── Push sur main / tag → Testing → 🚀 Shipped ───────────────────────────
  production-deployed:
    name: Push to main → Testing → Shipped
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Bulk transition Testing → Shipped
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          TESTING_ITEMS=$(gh api graphql -f query='query {
            node(id: "'"$PROJECT_ID"'") {
              ... on ProjectV2 {
                items(first:100) {
                  nodes {
                    id
                    fieldValueByName(name:"Status") {
                      ... on ProjectV2ItemFieldSingleSelectValue { optionId }
                    }
                  }
                }
              }
            }
          }' --jq '.data.node.items.nodes[] | select(.fieldValueByName.optionId == "'"$OPT_TESTING"'") | .id')
          COUNT=0
          for ITEM_ID in $TESTING_ITEMS; do
            gh api graphql -f query='mutation {
              updateProjectV2ItemFieldValue(input: {
                projectId: "'"$PROJECT_ID"'" itemId: "'"$ITEM_ID"'"
                fieldId: "'"$FIELD_ID"'"
                value: { singleSelectOptionId: "'"$OPT_SHIPPED"'" }
              }) { projectV2Item { id } }
            }' > /dev/null
            COUNT=$((COUNT + 1))
          done
          echo "🚀 Shipped: $COUNT items (${{ github.ref_name }})"
