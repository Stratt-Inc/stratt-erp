name: Bug Report
description: Signaler un bug ou un comportement inattendu
title: "[BUG] "
labels: ["bug", "P2 Medium"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Merci de remplir ce formulaire pour nous aider à reproduire et corriger le bug.

  - type: textarea
    id: description
    attributes:
      label: Description du bug
      description: Une description claire et concise du bug.
      placeholder: Décrivez ce qui se passe...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Etapes de reproduction
      description: Etapes pour reproduire le comportement.
      placeholder: |
        1. Aller sur '...'
        2. Cliquer sur '...'
        3. Faire défiler jusqu'à '...'
        4. Observer l'erreur
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
      description: Ce qui devrait se passer à la place.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportement observé
      description: Ce qui se passe réellement.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Captures d'écran / Logs
      description: Si applicable, ajoutez des captures ou des logs pour illustrer le problème.

  - type: dropdown
    id: severity
    attributes:
      label: Sévérité
      options:
        - P0 Critical — Bloquant production
        - P1 High — Impact majeur
        - P2 Medium — Impact modéré
        - P3 Low — Impact mineur
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: ex. v1.2.3
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Module concerné
      options:
        - Frontend
        - Backend
        - Database
        - IA / Agents
        - DevOps / Infrastructure
        - Authentification
        - Export / Documents
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environnement
      placeholder: |
        - OS: macOS 14 / Ubuntu 22.04 / Windows 11
        - Navigateur: Chrome 120 / Firefox 121
        - Node: 20.x
        - Go: 1.23.x