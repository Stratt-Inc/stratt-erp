app = "axiora-backend-staging"
primary_region = "cdg"
kill_signal = "SIGTERM"
kill_timeout = "10s"

[build]
  # Image pushed to GHCR by CI — supplied via --image at deploy time

[env]
  APP_ENV = "staging"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[http_service.checks]]
  interval = "15s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpus = 1
