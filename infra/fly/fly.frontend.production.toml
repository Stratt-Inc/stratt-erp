app = "axiora-frontend"
primary_region = "cdg"
kill_signal = "SIGTERM"
kill_timeout = "10s"

[build]
  # Image pushed to GHCR by CI — supplied via --image at deploy time

[env]
  NODE_ENV = "production"
  PORT = "3000"
  HOSTNAME = "0.0.0.0"
  NEXT_TELEMETRY_DISABLED = "1"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 500
    soft_limit = 400

[[http_service.checks]]
  interval = "15s"
  timeout = "5s"
  grace_period = "15s"
  method = "GET"
  path = "/"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
